<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <defs>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #1f2937; }
      .subtitle { font: 500 16px Arial, sans-serif; fill: #4b5563; }
      .layer { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; rx: 14; ry: 14; }
      .box { fill: #ffffff; stroke: #64748b; stroke-width: 2; rx: 10; ry: 10; }
      .box-ai { fill: #eef2ff; stroke: #6366f1; }
      .box-risk { fill: #ecfeff; stroke: #0891b2; }
      .box-exec { fill: #fff7ed; stroke: #ea580c; }
      .box-data { fill: #f0fdf4; stroke: #16a34a; }
      .head { font: 700 16px Arial, sans-serif; fill: #111827; }
      .txt { font: 500 13px Arial, sans-serif; fill: #374151; }
      .arrow { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .dash { stroke-dasharray: 8 6; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155" />
    </marker>
  </defs>

  <text x="40" y="48" class="title">STRATA - High-Level Architecture (Current)</text>
  <text x="40" y="74" class="subtitle">AI-assisted signal, backtest, execution, protection, and continuous monitoring workflow</text>

  <rect x="30" y="100" width="1540" height="140" class="layer" />
  <text x="52" y="130" class="head">External Integrations</text>

  <rect x="60" y="150" width="290" height="70" class="box box-data" />
  <text x="78" y="176" class="head">Market Data Providers</text>
  <text x="78" y="198" class="txt">Binance, yfinance, CoinGecko</text>

  <rect x="390" y="150" width="290" height="70" class="box box-ai" />
  <text x="408" y="176" class="head">AI Providers</text>
  <text x="408" y="198" class="txt">xAI, OpenAI, Anthropic, Ollama, OpenClaw</text>

  <rect x="720" y="150" width="290" height="70" class="box box-exec" />
  <text x="738" y="176" class="head">Binance Trading API</text>
  <text x="738" y="198" class="txt">Portfolio, Orders, Fills, Open Orders</text>

  <rect x="1050" y="150" width="490" height="70" class="box" />
  <text x="1068" y="176" class="head">Local Secure Configuration</text>
  <text x="1068" y="198" class="txt">Profiles, API keys (user-local), runtime state, scheduler settings</text>

  <rect x="30" y="270" width="1540" height="210" class="layer" />
  <text x="52" y="300" class="head">Core Engine + Orchestration</text>

  <rect x="60" y="325" width="360" height="130" class="box" />
  <text x="78" y="350" class="head">GUI Orchestrator (`gui_app/main.py`)</text>
  <text x="78" y="372" class="txt">Task queue + monitor, tabs, command routing</text>
  <text x="78" y="392" class="txt">Agent console + AI fallback + context memory</text>
  <text x="78" y="412" class="txt">Schedulers: live pipeline + protection monitor</text>

  <rect x="450" y="325" width="360" height="130" class="box" />
  <text x="468" y="350" class="head">Engine Bridge (`gui_app/engine_bridge.py`)</text>
  <text x="468" y="372" class="txt">Thread-safe calls to strategy runtime</text>
  <text x="468" y="392" class="txt">Backtest/live wrappers + AI call gateway</text>
  <text x="468" y="412" class="txt">Binance adapters + reconcile + ledger helpers</text>

  <rect x="840" y="325" width="360" height="130" class="box" />
  <text x="858" y="350" class="head">Strategy Runtime (`nightly/BTC-beta.py`)</text>
  <text x="858" y="372" class="txt">Indicators, scoring, fib logic, backtest engine</text>
  <text x="858" y="392" class="txt">Prompt builders, provider adapters, utilities</text>
  <text x="858" y="412" class="txt">Walk-forward/optuna and data transforms</text>

  <rect x="1230" y="325" width="310" height="130" class="box box-risk" />
  <text x="1248" y="350" class="head">Risk &amp; Validation Guardrails</text>
  <text x="1248" y="372" class="txt">Max loss/trades/exposure, stop-required policy</text>
  <text x="1248" y="392" class="txt">Exchange filters: lot/tick/notional checks</text>
  <text x="1248" y="412" class="txt">Duplicate-signal cooldown + activity guard</text>

  <rect x="30" y="510" width="1540" height="230" class="layer" />
  <text x="52" y="540" class="head">Decision and Execution Flows</text>

  <rect x="60" y="565" width="360" height="150" class="box box-ai" />
  <text x="78" y="590" class="head">AI Decision Workflows</text>
  <text x="78" y="612" class="txt">Live -> AI</text>
  <text x="78" y="632" class="txt">Live -> Backtest -> AI</text>
  <text x="78" y="652" class="txt">Open Positions -> Backtest -> AI Protection Plan</text>
  <text x="78" y="672" class="txt">Structured JSON plans parsed into staged actions</text>

  <rect x="450" y="565" width="360" height="150" class="box box-exec" />
  <text x="468" y="590" class="head">Recommendation Staging</text>
  <text x="468" y="612" class="txt">Pending table: BUY/SELL/STOP_LOSS_LIMIT</text>
  <text x="468" y="632" class="txt">Autosizing from balances + confidence weighting</text>
  <text x="468" y="652" class="txt">Review/approve/submit (manual/semi/auto)</text>
  <text x="468" y="672" class="txt">Replace existing protective stops safely</text>

  <rect x="840" y="565" width="360" height="150" class="box box-risk" />
  <text x="858" y="590" class="head">Order Execution Pipeline</text>
  <text x="858" y="612" class="txt">Pre-check balances + normalize quantities/prices</text>
  <text x="858" y="632" class="txt">Submit to Binance + optional protective stop</text>
  <text x="858" y="652" class="txt">Reconcile fills and update open positions</text>
  <text x="858" y="672" class="txt">Execution ledger write (quote/display PnL)</text>

  <rect x="1230" y="565" width="310" height="150" class="box" />
  <text x="1248" y="590" class="head">Continuous Monitoring</text>
  <text x="1248" y="612" class="txt">Pipeline scheduler (Live/Backtest/AI)</text>
  <text x="1248" y="632" class="txt">Protection monitor (interval-based)</text>
  <text x="1248" y="652" class="txt">Optional auto-send protective updates</text>
  <text x="1248" y="672" class="txt">Task monitor + terminal output for observability</text>

  <rect x="30" y="770" width="1540" height="180" class="layer" />
  <text x="52" y="800" class="head">User-Facing Outputs</text>

  <rect x="60" y="825" width="360" height="95" class="box" />
  <text x="78" y="850" class="head">Live + Risk Dashboards</text>
  <text x="78" y="872" class="txt">Ranked actions, fib levels, setup quality, reliability</text>
  <text x="78" y="892" class="txt">Multi-timeframe and portfolio context</text>

  <rect x="450" y="825" width="360" height="95" class="box" />
  <text x="468" y="850" class="head">Backtest Views</text>
  <text x="468" y="872" class="txt">Trade history, equity summary, risk stats</text>
  <text x="468" y="892" class="txt">Walk-forward and holdout metrics</text>

  <rect x="840" y="825" width="360" height="95" class="box" />
  <text x="858" y="850" class="head">Portfolio &amp; Ledger Views</text>
  <text x="858" y="872" class="txt">Open positions + realized/unrealized PnL</text>
  <text x="858" y="892" class="txt">Execution and signal journals, open orders</text>

  <rect x="1230" y="825" width="310" height="95" class="box box-ai" />
  <text x="1248" y="850" class="head">Agent Console</text>
  <text x="1248" y="872" class="txt">Natural-language intents and action plans</text>
  <text x="1248" y="892" class="txt">Status, balance, PnL, scheduling commands</text>

  <path class="arrow" d="M 205 220 L 205 325" />
  <path class="arrow" d="M 535 220 L 535 325" />
  <path class="arrow" d="M 865 220 L 865 325" />
  <path class="arrow" d="M 1295 220 L 1295 325" />

  <path class="arrow" d="M 420 390 L 450 390" />
  <path class="arrow" d="M 810 390 L 840 390" />
  <path class="arrow" d="M 1200 390 L 1230 390" />

  <path class="arrow" d="M 240 455 L 240 565" />
  <path class="arrow" d="M 630 455 L 630 565" />
  <path class="arrow" d="M 1020 455 L 1020 565" />
  <path class="arrow" d="M 1385 455 L 1385 565" />

  <path class="arrow dash" d="M 420 640 L 450 640" />
  <path class="arrow dash" d="M 810 640 L 840 640" />
  <path class="arrow dash" d="M 1200 640 L 1230 640" />

  <path class="arrow" d="M 240 715 L 240 825" />
  <path class="arrow" d="M 630 715 L 630 825" />
  <path class="arrow" d="M 1020 715 L 1020 825" />
  <path class="arrow" d="M 1385 715 L 1385 825" />
</svg>
